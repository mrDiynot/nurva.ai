# HTTP-only configuration
# Certbot will automatically add HTTPS and redirect when you run it

server {
    listen 80;
    listen [::]:80;
    server_name nurvaai.com www.nurvaai.com;

    client_max_body_size 10M;

    # Static files
    location /static/ {
        alias /root/App/staticfiles/;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /root/App/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Let's Encrypt ACME challenge - MUST come before location /
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Django application
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss;

    # Logging
    access_log /var/log/nginx/nurva_access.log;
    error_log /var/log/nginx/nurva_error.log;
}
