server {
    listen 80;
    listen [::]:80;
    server_name nurvaai.com www.nurvaai.com;

    # Temporary: Allow Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy to Gunicorn (TCP)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files
    location /static/ {
        alias /root/App/staticfiles/;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /root/App/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Logging
    access_log /var/log/nginx/nurva_access.log;
    error_log /var/log/nginx/nurva_error.log;

    # Client upload limit
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss;
}
